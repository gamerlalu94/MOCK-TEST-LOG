<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Toss</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .toss-container {
            max-width: 600px;
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            text-align: center;
            color: #fff;
        }

        .match-info {
            margin-bottom: 30px;
        }

        .team-names {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .team-name {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            font-size: 18px;
            font-weight: 700;
        }

        .match-info h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .match-info p {
            font-size: 14px;
            opacity: 0.9;
        }

        .coin-section {
            margin: 40px 0;
        }

        .coin-container {
            display: flex;
            justify-content: center;
            margin: 30px 0;
        }

        .coin {
            width: 150px;
            height: 150px;
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 72px;
            font-weight: 900;
            box-shadow: 0 10px 40px rgba(255, 215, 0, 0.5);
            cursor: pointer;
            transition: all 0.3s;
            border: 5px solid #fff;
            user-select: none;
            animation: spin 0.6s ease-out;
        }

        .coin:hover:not(.flipping) {
            transform: scale(1.05);
        }

        .coin.flipping {
            animation: coinFlip 1s ease-out;
        }

        @keyframes coinFlip {
            0% {
                transform: rotateY(0deg) rotateZ(0deg) scale(1);
            }
            50% {
                transform: rotateY(180deg) rotateZ(180deg) scale(1.1);
            }
            100% {
                transform: rotateY(360deg) rotateZ(0deg) scale(1);
            }
        }

        @keyframes spin {
            0% {
                transform: scale(0.8);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .coin-result {
            font-size: 18px;
            font-weight: 700;
            margin-top: 20px;
            color: #ffd700;
            min-height: 30px;
        }

        .toss-status {
            background: rgba(0, 0, 0, 0.2);
            padding: 20px;
            border-radius: 10px;
            margin: 30px 0;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .status-title {
            font-size: 16px;
            opacity: 0.8;
            margin-bottom: 10px;
        }

        .status-text {
            font-size: 24px;
            font-weight: 900;
            color: #ffd700;
            word-break: break-word;
        }

        .choice-section {
            margin: 30px 0;
            display: none;
        }

        .choice-section.active {
            display: block;
        }

        .choice-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .choice-btn {
            padding: 20px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .choice-btn.heads {
            background: #ff6b6b;
            color: white;
        }

        .choice-btn.heads:hover {
            background: #ff5252;
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(255, 107, 107, 0.4);
        }

        .choice-btn.heads.selected {
            background: #fff;
            color: #ff6b6b;
            border: 3px solid #ff6b6b;
        }

        .choice-btn.tails {
            background: #00d084;
            color: white;
        }

        .choice-btn.tails:hover {
            background: #00e699;
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 214, 132, 0.4);
        }

        .choice-btn.tails.selected {
            background: #fff;
            color: #00d084;
            border: 3px solid #00d084;
        }

        .decision-section {
            margin: 30px 0;
            display: none;
        }

        .decision-section.active {
            display: block;
        }

        .decision-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #ffd700;
        }

        .decision-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .decision-btn {
            padding: 18px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            border: 2px solid rgba(255, 255, 255, 0.5);
        }

        .decision-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            border-color: #ffd700;
            transform: translateY(-3px);
        }

        .decision-btn:active {
            transform: scale(0.95);
        }

        .flip-button {
            background: #ffd700;
            color: #000;
            padding: 18px 40px;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .flip-button:hover:not(:disabled) {
            background: #ffed4e;
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.4);
        }

        .flip-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .flip-button:active:not(:disabled) {
            transform: scale(0.95);
        }

        .proceed-button {
            background: #00d084;
            color: #fff;
            padding: 18px 40px;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
            width: 100%;
            margin-top: 20px;
            display: block;
        }

        .proceed-button:hover {
            background: #00e699;
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 214, 132, 0.4);
        }

        .proceed-button:active {
            transform: scale(0.95);
        }

        .footer-info {
            font-size: 12px;
            opacity: 0.7;
            margin-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            padding-top: 20px;
        }

        /* Player Selection Section */
        .player-selection-section {
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid #ffd700;
            padding: 25px;
            border-radius: 10px;
            margin: 30px 0;
            display: none;
        }

        .player-selection-section.active {
            display: block;
            animation: slideDown 0.5s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .player-selection-title {
            font-size: 20px;
            font-weight: 900;
            color: #ffd700;
            margin-bottom: 20px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .player-selection-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 18px;
            margin-bottom: 20px;
        }

        .player-dropdown-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .player-dropdown-group label {
            font-size: 14px;
            font-weight: 700;
            color: #ffed4e;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .player-dropdown {
            padding: 14px 16px;
            border: 2px solid #ffd700;
            border-radius: 8px;
            background: #16213e;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .player-dropdown:hover {
            background: #0f3460;
            border-color: #ffed4e;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
        }

        .player-dropdown:focus {
            outline: none;
            background: #0f3460;
            border-color: #ffd700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        .player-dropdown option {
            background: #16213e;
            color: #fff;
            padding: 10px;
        }

        .player-dropdown option:hover {
            background: #0f3460;
        }

        .selection-error {
            color: #ff6b6b;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            min-height: 20px;
            margin-bottom: 10px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .toss-container {
                padding: 30px 20px;
            }

            .coin {
                width: 120px;
                height: 120px;
                font-size: 56px;
            }

            .match-info h1 {
                font-size: 22px;
            }

            .team-names {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .team-name {
                font-size: 14px;
            }
        }

        @media (max-width: 480px) {
            .toss-container {
                padding: 20px 15px;
            }

            .coin {
                width: 100px;
                height: 100px;
                font-size: 48px;
            }

            .match-info h1 {
                font-size: 18px;
            }

            .choice-buttons,
            .decision-buttons {
                grid-template-columns: 1fr;
            }

            .flip-button,
            .proceed-button {
                font-size: 16px;
                padding: 15px 25px;
            }

            .player-selection-container {
                grid-template-columns: 1fr;
                gap: 14px;
            }

            .player-selection-title {
                font-size: 16px;
            }

            .player-dropdown-group label {
                font-size: 13px;
            }

            .player-dropdown {
                padding: 12px 14px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="toss-container">
        <!-- Match Info -->
        <div class="match-info">
            <h1>🏏 Coin Toss</h1>
            <p>Decide who bats first</p>
            <div class="team-names">
                <div class="team-name" id="team1Name">Team 1</div>
                <div class="team-name" id="team2Name">Team 2</div>
            </div>
        </div>

        <!-- Coin Flip Section -->
        <div class="coin-section">
            <button class="flip-button" id="flipBtn" onclick="flipCoin()">🪙 Flip Coin</button>

            <div class="coin-container">
                <div class="coin" id="coinDisplay">🪙</div>
            </div>

            <div class="coin-result" id="coinResult"></div>
        </div>

        <!-- Toss Status -->
        <div class="toss-status">
            <div class="status-title">Toss Status</div>
            <div class="status-text" id="tossStatus">Click 'Flip Coin' to start...</div>
        </div>

        <!-- Choice Selection (Heads/Tails) -->
        <div class="choice-section" id="choiceSection">
            <div class="status-title">You Called:</div>
            <div class="choice-buttons">
                <button class="choice-btn heads" id="headsBtn" onclick="selectChoice('heads')">
                    ⭕ HEADS
                </button>
                <button class="choice-btn tails" id="tailsBtn" onclick="selectChoice('tails')">
                    🔶 TAILS
                </button>
            </div>
        </div>

        <!-- Decision Section (Bat/Field) -->
        <div class="decision-section" id="decisionSection">
            <div class="decision-title" id="decisionTitle"></div>
            <div class="decision-buttons">
                <button class="decision-btn" id="batBtn" onclick="selectDecision('bat')">
                    🏏 BAT
                </button>
                <button class="decision-btn" id="fieldBtn" onclick="selectDecision('field')">
                    🧤 FIELD
                </button>
            </div>
        </div>

        <!-- Player Selection Section -->
        <div class="player-selection-section" id="playerSelectionSection">
            <div class="player-selection-title">📋 Select Players for First Innings</div>
            
            <div class="player-selection-container">
                <div class="player-dropdown-group">
                    <label for="strikerSelect">🏏 Striker (Batter on Strike):</label>
                    <select id="strikerSelect" class="player-dropdown" onchange="updateNonStrikerOptions()">
                        <option value="">-- Select Striker --</option>
                    </select>
                </div>

                <div class="player-dropdown-group">
                    <label for="nonStrikerSelect">🏃 Non-Striker (Batter Off Strike):</label>
                    <select id="nonStrikerSelect" class="player-dropdown">
                        <option value="">-- Select Non-Striker --</option>
                    </select>
                </div>

                <div class="player-dropdown-group">
                    <label for="bowlerSelect">🎯 Bowler (First Bowler):</label>
                    <select id="bowlerSelect" class="player-dropdown">
                        <option value="">-- Select Bowler --</option>
                    </select>
                </div>

                <div class="player-dropdown-group">
                    <label for="oversSelect">📊 Match Format (Overs):</label>
                    <select id="oversSelect" class="player-dropdown" onchange="handleOversChange()">
                        <option value="20">🏏 T20 - 20 Overs</option>
                        <option value="50">🏏 ODI - 50 Overs</option>
                        <option value="unlimited">🏏 Test - Unlimited Overs</option>
                        <option value="custom">⚙️ Custom Overs</option>
                    </select>
                </div>

                <div class="player-dropdown-group" id="customOversGroup" style="display: none;">
                    <label for="customOvers">Enter Custom Overs:</label>
                    <input type="number" id="customOvers" class="player-dropdown" placeholder="e.g., 10" min="1" max="200" style="padding: 14px 16px; border: 2px solid #ffd700;">
                </div>
                <div class="player-dropdown-group" id="bowlerLimitGroup">
                    <label for="bowlerMaxOvers">Bowler Max Overs:</label>
                    <input type="number" id="bowlerMaxOvers" class="player-dropdown" placeholder="0 = unlimited" min="0" max="200" style="padding: 14px 16px; border: 2px solid #ffd700;">
                    <p id="bowlerLimitNote" style="margin-top: 10px; font-size: 0.9rem; color: #f5f5f5;">Set the maximum overs a bowler may bowl. 0 means unlimited.</p>
                </div>
            </div>

            <div class="selection-error" id="selectionError"></div>
        </div>

        <!-- Proceed Button -->
        <button class="proceed-button" id="proceedBtn" onclick="proceedToScorecard()">
            ▶ Go to Scorecard
        </button>

        <!-- Footer Info -->
        <div class="footer-info">
            <p>💡 Call heads or tails, then choose whether to bat or field if you win the toss!</p>
        </div>
    </div>

    <script>
        /**
         * ========================================
         * TOSS SIMULATOR - HEADS/TAILS RANDOMITY
         * ========================================
         */

        // Game state from previous screen
        let gameData = null;
        let tossState = {
            coinResult: null,          // 'heads' or 'tails'
            userChoice: null,          // what user called
            tossWinner: null,          // who won toss
            decision: null,            // 'bat' or 'field'
            battingTeamName: null,
            bowlingTeamName: null,
            battingTeamIndex: null,    // 0 = team1, 1 = team2
            bowlingTeamIndex: null     // 0 = team1, 1 = team2
        };

        /**
         * Initialize page with game data
         */
        window.addEventListener('DOMContentLoaded', function() {
            loadGameData();
            updateTeamNames();
            handleOversChange();
        });

        function loadGameData() {
            const gameDataStr = localStorage.getItem('gameData');
            if (!gameDataStr) {
                alert('❌ No game data found. Please start a new match.');
                window.location.href = '/cricket';
                return;
            }
            gameData = JSON.parse(gameDataStr);
        }

        function updateTeamNames() {
            document.getElementById('team1Name').textContent = gameData.team1.name;
            document.getElementById('team2Name').textContent = gameData.team2.name;
        }

        /**
         * Flip the coin with random heads/tails
         */
        function flipCoin() {
            const flipBtn = document.getElementById('flipBtn');
            const coinDisplay = document.getElementById('coinDisplay');
            const coinResult = document.getElementById('coinResult');
            const choiceSection = document.getElementById('choiceSection');
            const tossStatus = document.getElementById('tossStatus');

            // Disable button during flip
            flipBtn.disabled = true;

            // Add flipping animation
            coinDisplay.classList.add('flipping');

            // Generate random result (50/50 chance)
            setTimeout(() => {
                const random = Math.random();
                tossState.coinResult = random < 0.5 ? 'heads' : 'tails';

                // Update coin display
                coinDisplay.textContent = tossState.coinResult === 'heads' ? '⭕' : '🔶';
                coinDisplay.classList.remove('flipping');

                // Update result text
                coinResult.textContent = `${tossState.coinResult.toUpperCase()}!`;
                coinResult.style.color = tossState.coinResult === 'heads' ? '#ff6b6b' : '#00d084';

                // Show choice section
                choiceSection.classList.add('active');
                tossStatus.textContent = 'Choose what you called...';

                flipBtn.disabled = false;
            }, 1000);
        }

        /**
         * User selects heads or tails
         */
        function selectChoice(choice) {
            tossState.userChoice = choice;

            // Update button states
            document.getElementById('headsBtn').classList.remove('selected');
            document.getElementById('tailsBtn').classList.remove('selected');

            if (choice === 'heads') {
                document.getElementById('headsBtn').classList.add('selected');
            } else {
                document.getElementById('tailsBtn').classList.add('selected');
            }

            // Determine toss winner
            const wonToss = tossState.coinResult === tossState.userChoice;
            tossState.tossWinner = wonToss ? 1 : 2; // 1 = team1, 2 = team2

            // Update toss status
            const winnerTeam = tossState.tossWinner === 1 ? gameData.team1.name : gameData.team2.name;
            const tossStatus = document.getElementById('tossStatus');
            
            if (wonToss) {
                tossStatus.textContent = `✅ ${gameData.team1.name} WON THE TOSS!`;
                tossStatus.style.color = '#ffd700';
            } else {
                tossStatus.textContent = `✅ ${gameData.team2.name} WON THE TOSS!`;
                tossStatus.style.color = '#ffd700';
            }

            // Show decision section
            const decisionSection = document.getElementById('decisionSection');
            const decisionTitle = document.getElementById('decisionTitle');
            decisionTitle.textContent = `${winnerTeam}, choose to bat or field:`;
            decisionSection.classList.add('active');
        }

        /**
         * User makes bat/field decision
         */
        function selectDecision(decision) {
            tossState.decision = decision;

            // Update button states
            document.getElementById('batBtn').style.background = 'rgba(255, 255, 255, 0.2)';
            document.getElementById('batBtn').style.borderColor = 'rgba(255, 255, 255, 0.5)';
            document.getElementById('fieldBtn').style.background = 'rgba(255, 255, 255, 0.2)';
            document.getElementById('fieldBtn').style.borderColor = 'rgba(255, 255, 255, 0.5)';

            if (decision === 'bat') {
                document.getElementById('batBtn').style.background = '#ffd700';
                document.getElementById('batBtn').style.color = '#000';
                document.getElementById('batBtn').style.borderColor = '#ffd700';
            } else {
                document.getElementById('fieldBtn').style.background = '#00d084';
                document.getElementById('fieldBtn').style.color = '#fff';
                document.getElementById('fieldBtn').style.borderColor = '#00d084';
            }

            // Determine batting and bowling teams
            if (tossState.tossWinner === 1) {
                // Team 1 won toss
                if (decision === 'bat') {
                    tossState.battingTeamName = gameData.team1.name;
                    tossState.bowlingTeamName = gameData.team2.name;
                    tossState.battingTeamIndex = 0; // Team 1 batting
                    tossState.bowlingTeamIndex = 1; // Team 2 bowling
                } else {
                    tossState.battingTeamName = gameData.team2.name;
                    tossState.bowlingTeamName = gameData.team1.name;
                    tossState.battingTeamIndex = 1; // Team 2 batting
                    tossState.bowlingTeamIndex = 0; // Team 1 bowling
                }
            } else {
                // Team 2 won toss
                if (decision === 'bat') {
                    tossState.battingTeamName = gameData.team2.name;
                    tossState.bowlingTeamName = gameData.team1.name;
                    tossState.battingTeamIndex = 1; // Team 2 batting
                    tossState.bowlingTeamIndex = 0; // Team 1 bowling
                } else {
                    tossState.battingTeamName = gameData.team1.name;
                    tossState.bowlingTeamName = gameData.team2.name;
                    tossState.battingTeamIndex = 0; // Team 1 batting
                    tossState.bowlingTeamIndex = 1; // Team 2 bowling
                }
            }

            // Show player selection section
            populatePlayerDropdowns();
            document.getElementById('playerSelectionSection').classList.add('active');

            // Show proceed button
            document.getElementById('proceedBtn').style.display = 'block';

            // Update toss status with final decision
            const tossStatus = document.getElementById('tossStatus');
            tossStatus.textContent = `🏏 ${tossState.battingTeamName} to BAT first`;
            tossStatus.style.color = '#00d084';
        }

        /**
         * Populate player dropdowns with appropriate players
         */
        function populatePlayerDropdowns() {
            const battingTeam = tossState.battingTeamIndex === 0 ? gameData.team1 : gameData.team2;
            const bowlingTeam = tossState.bowlingTeamIndex === 0 ? gameData.team1 : gameData.team2;

            // Populate Striker dropdown
            const strikerSelect = document.getElementById('strikerSelect');
            strikerSelect.innerHTML = '<option value="">-- Select Striker --</option>';
            battingTeam.players.forEach((player, index) => {
                const option = document.createElement('option');
                option.value = index + '|' + player; // Store index and name
                option.textContent = player;
                strikerSelect.appendChild(option);
            });
            // Set first player as default
            if (battingTeam.players.length > 0) {
                strikerSelect.value = '0|' + battingTeam.players[0];
                updateNonStrikerOptions();
            }

            // Populate Bowler dropdown
            const bowlerSelect = document.getElementById('bowlerSelect');
            bowlerSelect.innerHTML = '<option value="">-- Select Bowler --</option>';
            bowlingTeam.players.forEach((player, index) => {
                const option = document.createElement('option');
                option.value = index + '|' + player; // Store index and name
                option.textContent = player;
                bowlerSelect.appendChild(option);
            });
            // Set first player as default
            if (bowlingTeam.players.length > 0) {
                bowlerSelect.value = '0|' + bowlingTeam.players[0];
            }
        }

        /**
         * Update Non-Striker dropdown to exclude selected Striker
         */
        function updateNonStrikerOptions() {
            const strikerSelect = document.getElementById('strikerSelect');
            const nonStrikerSelect = document.getElementById('nonStrikerSelect');
            const strikerValue = strikerSelect.value;

            const battingTeam = tossState.battingTeamIndex === 0 ? gameData.team1 : gameData.team2;

            // Clear error message
            document.getElementById('selectionError').textContent = '';

            // Rebuild non-striker dropdown excluding striker
            nonStrikerSelect.innerHTML = '<option value="">-- Select Non-Striker --</option>';
            battingTeam.players.forEach((player, index) => {
                // Skip if this player is the striker
                if (strikerValue === (index + '|' + player)) {
                    return;
                }
                const option = document.createElement('option');
                option.value = index + '|' + player;
                option.textContent = player;
                nonStrikerSelect.appendChild(option);
            });

            // Set second player as default if available
            if (battingTeam.players.length > 1 && strikerValue !== ('1|' + battingTeam.players[1])) {
                nonStrikerSelect.value = '1|' + battingTeam.players[1];
            }
        }

        /**
         * Handle overs format change
         */
        function handleOversChange() {
            const oversSelect = document.getElementById('oversSelect');
            const customOversGroup = document.getElementById('customOversGroup');
            const customOvers = document.getElementById('customOvers');
            const bowlerMaxOvers = document.getElementById('bowlerMaxOvers');
            const bowlerLimitNote = document.getElementById('bowlerLimitNote');

            if (oversSelect.value === 'custom') {
                customOversGroup.style.display = 'block';
                customOvers.focus();
                bowlerMaxOvers.disabled = false;
                bowlerMaxOvers.value = '';
                bowlerLimitNote.textContent = 'For a custom match, enter the bowler limit manually.';
            } else {
                customOversGroup.style.display = 'none';
                customOvers.value = '';
                bowlerMaxOvers.disabled = true;

                if (oversSelect.value === '20') {
                    bowlerMaxOvers.value = 4;
                    bowlerLimitNote.textContent = 'T20 format uses a 4-over bowler limit.';
                } else if (oversSelect.value === '50') {
                    bowlerMaxOvers.value = 10;
                    bowlerLimitNote.textContent = 'ODI format uses a 10-over bowler limit.';
                } else if (oversSelect.value === 'unlimited') {
                    bowlerMaxOvers.value = 0;
                    bowlerLimitNote.textContent = 'Unlimited overs means no bowler limit.';
                }
            }
        }

        /**
         * Validate player selections
         */
        function validatePlayerSelections() {
            const strikerSelect = document.getElementById('strikerSelect');
            const nonStrikerSelect = document.getElementById('nonStrikerSelect');
            const bowlerSelect = document.getElementById('bowlerSelect');
            const oversSelect = document.getElementById('oversSelect');
            const customOvers = document.getElementById('customOvers');
            const bowlerMaxOvers = document.getElementById('bowlerMaxOvers');
            const errorDiv = document.getElementById('selectionError');

            let errorMessage = '';

            if (!strikerSelect.value) {
                errorMessage = '❌ Please select a Striker';
            } else if (!nonStrikerSelect.value) {
                errorMessage = '❌ Please select a Non-Striker';
            } else if (!bowlerSelect.value) {
                errorMessage = '❌ Please select a Bowler';
            } else if (!oversSelect.value) {
                errorMessage = '❌ Please select match format';
            } else if (oversSelect.value === 'custom' && (!customOvers.value || customOvers.value < 1)) {
                errorMessage = '❌ Please enter valid custom overs (1-200)';
            } else {
                const maxBowlerOversValue = parseInt(bowlerMaxOvers.value);
                if (isNaN(maxBowlerOversValue) || maxBowlerOversValue < 0) {
                    errorMessage = '❌ Please enter a valid bowler max overs value (0 or greater)';
                } else {
                    const strikerName = strikerSelect.value.split('|')[1];
                    const nonStrikerName = nonStrikerSelect.value.split('|')[1];
                    const bowlerName = bowlerSelect.value.split('|')[1];

                    if (strikerName === nonStrikerName) {
                        errorMessage = '❌ Striker and Non-Striker must be different players';
                    } else if (bowlerName === strikerName || bowlerName === nonStrikerName) {
                        errorMessage = '❌ Bowler cannot be one of the batters';
                    }
                }
            }

            if (errorMessage) {
                errorDiv.textContent = errorMessage;
                errorDiv.style.color = '#ff6b6b';
                return false;
            }

            errorDiv.textContent = '✅ All selections valid!';
            errorDiv.style.color = '#2ecc71';
            return true;
        }

        /**
         * Proceed to scorecard with toss decision and player selection
         */
        function proceedToScorecard() {
            if (!tossState.decision) {
                alert('❌ Please make a batting/fielding decision');
                return;
            }

            // Validate player selections
            if (!validatePlayerSelections()) {
                return;
            }

            // Extract selected players
            const strikerValue = document.getElementById('strikerSelect').value.split('|');
            const nonStrikerValue = document.getElementById('nonStrikerSelect').value.split('|');
            const bowlerValue = document.getElementById('bowlerSelect').value.split('|');
            const oversSelect = document.getElementById('oversSelect');
            const customOvers = document.getElementById('customOvers');
            const bowlerMaxOvers = document.getElementById('bowlerMaxOvers');

            const strikerIndex = parseInt(strikerValue[0]);
            const strikerName = strikerValue[1];
            const nonStrikerIndex = parseInt(nonStrikerValue[0]);
            const nonStrikerName = nonStrikerValue[1];
            const bowlerIndex = parseInt(bowlerValue[0]);
            const bowlerName = bowlerValue[1];

            // Determine total overs
            let totalOvers = 0;
            if (oversSelect.value === 'custom') {
                totalOvers = parseInt(customOvers.value);
            } else if (oversSelect.value === 'unlimited') {
                totalOvers = -1; // Unlimited
            } else {
                totalOvers = parseInt(oversSelect.value);
            }

            const maxBowlerOvers = parseInt(bowlerMaxOvers.value);

            // Save toss info and player selection to localStorage
            const updatedGameData = {
                ...gameData,
                tossWinner: tossState.tossWinner,
                battingTeam: tossState.battingTeamName,
                bowlingTeam: tossState.bowlingTeamName,
                battingTeamIndex: tossState.battingTeamIndex,
                bowlingTeamIndex: tossState.bowlingTeamIndex,
                tossDecision: tossState.decision,
                coinResult: tossState.coinResult,
                userChoice: tossState.userChoice,
                // Player selections for first innings
                strikerIndex: strikerIndex,
                strikerName: strikerName,
                nonStrikerIndex: nonStrikerIndex,
                nonStrikerName: nonStrikerName,
                bowlerIndex: bowlerIndex,
                bowlerName: bowlerName,
                // Match format
                totalOvers: totalOvers,
                matchFormat: oversSelect.value,
                maxBowlerOvers: isNaN(maxBowlerOvers) ? 0 : maxBowlerOvers
            };

            localStorage.setItem('gameData', JSON.stringify(updatedGameData));

            // Redirect to scorecard
            window.location.href = '/scorecard';
        }
    </script>
</body>
</html>
