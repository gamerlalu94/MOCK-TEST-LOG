<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Results</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 10px;
        }

        .results-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* ========== HEADER ========== */
        .results-header {
            background: linear-gradient(135deg, #0f3460 0%, #16213e 100%);
            border-bottom: 4px solid #ffd700;
            padding: 30px 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            text-align: center;
        }

        .results-header h1 {
            font-size: 32px;
            color: #ffed4e;
            margin-bottom: 10px;
        }

        .match-winner {
            font-size: 28px;
            color: #2ecc71;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .winning-margin {
            font-size: 18px;
            color: #b0b0b0;
            margin-bottom: 20px;
        }

        .man-of-match {
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            color: #000;
            padding: 15px 25px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 16px;
            display: inline-block;
        }

        /* ========== INNINGS SUMMARY ========== */
        .innings-summary-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .innings-card {
            background: #0f3460;
            border: 3px solid #ffd700;
            border-radius: 8px;
            padding: 20px;
        }

        .innings-card h2 {
            color: #ffed4e;
            margin-bottom: 15px;
            font-size: 20px;
            border-bottom: 2px solid #ffd700;
            padding-bottom: 10px;
        }

        .innings-stat {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #16213e;
        }

        .innings-stat:last-child {
            border-bottom: none;
        }

        .innings-stat-label {
            color: #b0b0b0;
            font-size: 14px;
        }

        .innings-stat-value {
            color: #2ecc71;
            font-weight: bold;
            font-size: 16px;
        }

        /* ========== SCORECARDS SECTION ========== */
        .scorecards-section {
            margin-bottom: 30px;
        }

        .scorecards-header {
            font-size: 24px;
            color: #ffed4e;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid #ffd700;
        }

        /* ========== TEAM SCORECARDS ========== */
        .team-scorecards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .team-scorecard {
            background: #0f3460;
            border: 2px solid #ffd700;
            border-radius: 8px;
            padding: 20px;
        }

        .team-scorecard h3 {
            color: #ffed4e;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .team-scorecard h4 {
            color: #3498db;
            margin-top: 15px;
            margin-bottom: 10px;
            font-size: 14px;
            text-transform: uppercase;
        }

        /* ========== PLAYER CARDS ========== */
        .player-card {
            background: #16213e;
            border-left: 4px solid #ffd700;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 4px;
            font-size: 13px;
        }

        .player-name {
            color: #ffed4e;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .player-status {
            color: #b0b0b0;
            font-size: 11px;
            margin-bottom: 8px;
        }

        .player-stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 6px;
        }

        .stat-mini {
            background: #0f3460;
            padding: 6px;
            border-radius: 3px;
            text-align: center;
        }

        .stat-mini-label {
            color: #b0b0b0;
            font-size: 10px;
        }

        .stat-mini-value {
            color: #2ecc71;
            font-weight: bold;
            font-size: 12px;
        }

        /* BATTING CARDS */
        .batting-card .player-stats-grid {
            grid-template-columns: 1fr 1fr 1fr 1fr;
        }

        /* BOWLING CARDS */
        .bowling-card .player-stats-grid {
            grid-template-columns: 1fr 1fr 1fr 1fr;
        }

        .bowling-card {
            border-left-color: #ff6b6b;
        }

        /* ========== BUTTONS ========== */
        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 30px;
            border: 2px solid #ffd700;
            background: #16213e;
            color: #ffd700;
            border-radius: 6px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: #ffd700;
            color: #000;
            transform: scale(1.05);
        }

        .btn-primary {
            background: #2ecc71;
            color: white;
            border-color: #2ecc71;
        }

        .btn-primary:hover {
            background: #27ae60;
            border-color: #27ae60;
        }

        /* ========== RESPONSIVE DESIGN ========== */
        @media (max-width: 1024px) {
            .team-scorecards {
                grid-template-columns: 1fr;
            }

            .innings-summary-container {
                grid-template-columns: 1fr;
            }

            .player-stats-grid {
                grid-template-columns: 1fr 1fr 1fr 1fr;
            }
        }

        @media (max-width: 768px) {
            .results-header {
                padding: 20px 15px;
            }

            .results-header h1 {
                font-size: 24px;
            }

            .match-winner {
                font-size: 20px;
            }

            .winning-margin {
                font-size: 14px;
            }

            .man-of-match {
                font-size: 14px;
                padding: 10px 20px;
            }

            .team-scorecard {
                padding: 15px;
            }

            .team-scorecard h3 {
                font-size: 16px;
            }

            .player-stats-grid {
                grid-template-columns: 1fr 1fr 1fr 1fr;
            }

            .button-group {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 5px;
            }

            .results-header {
                padding: 15px 10px;
                margin-bottom: 15px;
            }

            .results-header h1 {
                font-size: 18px;
            }

            .match-winner {
                font-size: 16px;
            }

            .winning-margin {
                font-size: 12px;
                margin-bottom: 10px;
            }

            .man-of-match {
                font-size: 12px;
                padding: 8px 15px;
            }

            .team-scorecard {
                padding: 10px;
            }

            .team-scorecard h3 {
                font-size: 14px;
            }

            .team-scorecard h4 {
                font-size: 12px;
            }

            .player-card {
                padding: 8px;
                margin-bottom: 6px;
            }

            .player-name {
                margin-bottom: 4px;
            }

            .player-stats-grid {
                grid-template-columns: 1fr 1fr 1fr 1fr;
            }

            .stat-mini-label {
                font-size: 9px;
            }

            .stat-mini-value {
                font-size: 11px;
            }

            .scorecards-header {
                font-size: 18px;
            }
        }

        .no-data {
            text-align: center;
            color: #b0b0b0;
            padding: 20px;
        }

        @keyframes slideInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .results-header {
            animation: slideInDown 0.6s ease-out;
        }

        .celebration {
            animation: pulse 0.6s ease-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
    </style>
</head>
<body>
    <div class="results-container">
        <!-- Results Header -->
        <header class="results-header celebration">
            <h1>🏆 MATCH COMPLETE 🏆</h1>
            <div class="match-winner" id="matchWinner">Team A Wins!</div>
            <div class="winning-margin" id="winningMargin">by 25 runs</div>
            <div class="man-of-match" id="momDisplay">🌟 Man of Match: Player Name</div>
        </header>

        <!-- Innings Summary -->
        <div class="innings-summary-container">
            <div class="innings-card">
                <h2>1st Innings</h2>
                <div class="innings-stat">
                    <span class="innings-stat-label">Team</span>
                    <span class="innings-stat-value" id="innings1Team">Team A</span>
                </div>
                <div class="innings-stat">
                    <span class="innings-stat-label">Runs</span>
                    <span class="innings-stat-value" id="innings1Runs">0/0</span>
                </div>
                <div class="innings-stat">
                    <span class="innings-stat-label">Overs</span>
                    <span class="innings-stat-value" id="innings1Overs">0.0</span>
                </div>
                <div class="innings-stat">
                    <span class="innings-stat-label">Run Rate</span>
                    <span class="innings-stat-value" id="innings1RR">0.0</span>
                </div>
            </div>

            <div class="innings-card">
                <h2>2nd Innings</h2>
                <div class="innings-stat">
                    <span class="innings-stat-label">Team</span>
                    <span class="innings-stat-value" id="innings2Team">Team B</span>
                </div>
                <div class="innings-stat">
                    <span class="innings-stat-label">Runs</span>
                    <span class="innings-stat-value" id="innings2Runs">0/0</span>
                </div>
                <div class="innings-stat">
                    <span class="innings-stat-label">Overs</span>
                    <span class="innings-stat-value" id="innings2Overs">0.0</span>
                </div>
                <div class="innings-stat">
                    <span class="innings-stat-label">Run Rate</span>
                    <span class="innings-stat-value" id="innings2RR">0.0</span>
                </div>
            </div>
        </div>

        <!-- Player Scorecards -->
        <div class="scorecards-section">
            <div class="scorecards-header">📊 Player Scorecards</div>

            <div class="team-scorecards">
                <!-- Team 1 Scorecard -->
                <div class="team-scorecard">
                    <h3 id="team1Name">Team A</h3>

                    <h4>Batting</h4>
                    <div id="team1Batting"></div>

                    <h4>Bowling</h4>
                    <div id="team1Bowling"></div>
                </div>

                <!-- Team 2 Scorecard -->
                <div class="team-scorecard">
                    <h3 id="team2Name">Team B</h3>

                    <h4>Batting</h4>
                    <div id="team2Batting"></div>

                    <h4>Bowling</h4>
                    <div id="team2Bowling"></div>
                </div>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="button-group">
            <button class="btn btn-primary" onclick="startNewMatch()">🔄 Start New Match</button>
            <button class="btn" onclick="viewScorecard()">📋 View Scorecard</button>
            <button class="btn" onclick="downloadSummary()">📥 Download Summary</button>
        </div>
    </div>

    <script>
        let matchData = null;

        window.addEventListener('DOMContentLoaded', () => {
            loadMatchData();
            displayResults();
        });

        function loadMatchData() {
            const data = localStorage.getItem('matchData');
            if (data) {
                matchData = JSON.parse(data);
            } else {
                console.error('No match data found');
                matchData = {
                    innings1: {},
                    innings2: {},
                    playerStats: {}
                };
            }
        }

        function displayResults() {
            if (!matchData || !matchData.innings1 || !matchData.innings2) {
                return;
            }

            const innings1 = matchData.innings1;
            const innings2 = matchData.innings2;
            const playerStats = matchData.playerStats || {};

            // Display Innings Info
            document.getElementById('innings1Team').textContent = innings1.teamName || 'Team 1';
            document.getElementById('innings1Runs').textContent = `${innings1.runs}/${innings1.wickets}`;
            document.getElementById('innings1Overs').textContent = (innings1.overs || 0).toFixed(1);
            let rr1 = innings1.overs > 0 ? (innings1.runs / innings1.overs).toFixed(2) : '0.0';
            document.getElementById('innings1RR').textContent = rr1;

            document.getElementById('innings2Team').textContent = innings2.teamName || 'Team 2';
            document.getElementById('innings2Runs').textContent = `${innings2.runs}/${innings2.wickets}`;
            document.getElementById('innings2Overs').textContent = (innings2.overs || 0).toFixed(1);
            let rr2 = innings2.overs > 0 ? (innings2.runs / innings2.overs).toFixed(2) : '0.0';
            document.getElementById('innings2RR').textContent = rr2;

            // Display Team Names
            document.getElementById('team1Name').textContent = innings1.teamName || 'Team 1';
            document.getElementById('team2Name').textContent = innings2.teamName || 'Team 2';

            // Calculate winner and margin
            let winner, margin;
            if (innings2.runs >= innings2.target) {
                winner = innings2.teamName;
                margin = innings1.wickets - innings2.wickets;
                if (margin < 0) margin = 0;
                document.getElementById('matchWinner').textContent = `🎉 ${winner} WINS! 🎉`;
                document.getElementById('winningMargin').textContent = `by ${margin} wicket${margin !== 1 ? 's' : ''}`;
            } else {
                winner = innings1.teamName;
                margin = innings2.runs - innings2.runs; // Actually: target - runs
                margin = innings2.target - innings2.runs;
                document.getElementById('matchWinner').textContent = `🎉 ${winner} WINS! 🎉`;
                document.getElementById('winningMargin').textContent = `by ${margin} run${margin !== 1 ? 's' : ''}`;
            }

            // Find Man of Match (highest scorer in winning team)
            let momPlayer = null;
            let momRuns = 0;
            for (let playerName in playerStats) {
                let player = playerStats[playerName];
                if (player.team === winner && player.batting.runs > momRuns) {
                    momRuns = player.batting.runs;
                    momPlayer = playerName;
                }
            }
            document.getElementById('momDisplay').textContent = `🌟 Man of Match: ${momPlayer || 'TBD'} (${momRuns} runs)`;

            // Display Player Scorecards
            displayTeamScorecard(innings1.teamName, 'team1', playerStats);
            displayTeamScorecard(innings2.teamName, 'team2', playerStats);
        }

        function displayTeamScorecard(teamName, teamId, playerStats) {
            let battingHtml = '';
            let bowlingHtml = '';

            for (let playerName in playerStats) {
                let player = playerStats[playerName];
                if (player.team === teamName) {
                    // Batting Card
                    if (player.batting.balls > 0 || player.batting.runs > 0) {
                        let sr = player.batting.balls > 0 ? 
                            ((player.batting.runs / player.batting.balls) * 100).toFixed(1) : '-';
                        battingHtml += `
                            <div class="player-card batting-card">
                                <div class="player-name">${player.name}</div>
                                <div class="player-status">${player.batting.dismissal}</div>
                                <div class="player-stats-grid">
                                    <div class="stat-mini">
                                        <div class="stat-mini-label">Runs</div>
                                        <div class="stat-mini-value">${player.batting.runs}</div>
                                    </div>
                                    <div class="stat-mini">
                                        <div class="stat-mini-label">Balls</div>
                                        <div class="stat-mini-value">${player.batting.balls}</div>
                                    </div>
                                    <div class="stat-mini">
                                        <div class="stat-mini-label">S/R</div>
                                        <div class="stat-mini-value">${sr}</div>
                                    </div>
                                    <div class="stat-mini">
                                        <div class="stat-mini-label">Status</div>
                                        <div class="stat-mini-value">${player.batting.dismissal === 'out' ? '🔴' : '✓'}</div>
                                    </div>
                                </div>
                            </div>
                        `;
                    }

                    // Bowling Card
                    if (player.bowling.ballsBowled > 0 || player.bowling.wickets > 0) {
                        let overs = Math.floor(player.bowling.ballsBowled / 6);
                        let balls = player.bowling.ballsBowled % 6;
                        let economy = player.bowling.ballsBowled > 0 ? 
                            ((player.bowling.runs / player.bowling.ballsBowled) * 6).toFixed(2) : '0.0';
                        bowlingHtml += `
                            <div class="player-card bowling-card">
                                <div class="player-name">${player.name}</div>
                                <div class="player-stats-grid">
                                    <div class="stat-mini">
                                        <div class="stat-mini-label">Overs</div>
                                        <div class="stat-mini-value">${overs}.${balls}</div>
                                    </div>
                                    <div class="stat-mini">
                                        <div class="stat-mini-label">Runs</div>
                                        <div class="stat-mini-value">${player.bowling.runs}</div>
                                    </div>
                                    <div class="stat-mini">
                                        <div class="stat-mini-label">Wkts</div>
                                        <div class="stat-mini-value">${player.bowling.wickets}</div>
                                    </div>
                                    <div class="stat-mini">
                                        <div class="stat-mini-label">Econ</div>
                                        <div class="stat-mini-value">${economy}</div>
                                    </div>
                                </div>
                            </div>
                        `;
                    }
                }
            }

            document.getElementById(teamId + 'Batting').innerHTML = battingHtml || 
                '<div class="no-data">No batting data</div>';
            document.getElementById(teamId + 'Bowling').innerHTML = bowlingHtml || 
                '<div class="no-data">No bowling data</div>';
        }

        function startNewMatch() {
            localStorage.removeItem('gameData');
            localStorage.removeItem('matchData');
            window.location.href = '/cricket';
        }

        function viewScorecard() {
            window.history.back();
        }

        function downloadSummary() {
            let summary = generateSummary();
            let blob = new Blob([summary], { type: 'text/plain' });
            let url = window.URL.createObjectURL(blob);
            let a = document.createElement('a');
            a.href = url;
            a.download = 'match-summary.txt';
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
            document.body.removeChild(a);
        }

        function generateSummary() {
            if (!matchData) return '';

            const innings1 = matchData.innings1;
            const innings2 = matchData.innings2;

            let summary = `CRICKET MATCH SUMMARY\n`;
            summary += `${'='.repeat(50)}\n\n`;
            summary += `FIRST INNINGS\n`;
            summary += `Team: ${innings1.teamName}\n`;
            summary += `Score: ${innings1.runs}/${innings1.wickets}\n`;
            summary += `Overs: ${(innings1.overs || 0).toFixed(1)}\n`;
            summary += `RR: ${innings1.overs > 0 ? (innings1.runs / innings1.overs).toFixed(2) : '0.0'}\n\n`;

            summary += `SECOND INNINGS\n`;
            summary += `Team: ${innings2.teamName}\n`;
            summary += `Target: ${innings2.target}\n`;
            summary += `Score: ${innings2.runs}/${innings2.wickets}\n`;
            summary += `Overs: ${(innings2.overs || 0).toFixed(1)}\n`;
            summary += `RR: ${innings2.overs > 0 ? (innings2.runs / innings2.overs).toFixed(2) : '0.0'}\n\n`;

            return summary;
        }
    </script>
</body>
</html>
